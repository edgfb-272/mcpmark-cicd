name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    name: Issue Triage
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found, exiting.');
              return;
            }

            const issueNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const currentLabels = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
            const labelsToAdd = new Set();
            const labelsToRemove = new Set();

            // Ensure base labels exist (best-effort)
            const requiredLabels = [
              { name: 'bug', description: "Something isn't working", color: 'd73a4a' },
              { name: 'enhancement', description: 'New feature or request', color: 'a2eeef' },
              { name: 'epic', description: 'Large feature requiring multiple sub-tasks', color: '5319e7' },
              { name: 'maintenance', description: 'Maintenance and housekeeping tasks', color: 'c5def5' },
              { name: 'priority-critical', description: 'Critical priority issue', color: 'b60205' },
              { name: 'priority-high', description: 'High priority issue', color: 'd93f0b' },
              { name: 'priority-medium', description: 'Medium priority issue', color: 'fbca04' },
              { name: 'priority-low', description: 'Low priority issue', color: '0e8a16' },
              { name: 'needs-triage', description: 'Needs to be reviewed by maintainers', color: 'ededed' },
              { name: 'needs-review', description: 'Awaiting review from maintainers', color: '5319e7' },
              { name: 'first-time-contributor', description: 'Issue created by first-time contributor', color: '0e8a16' },
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    description: label.description,
                    color: label.color,
                  });
                  core.info(`Created label: ${label.name}`);
                } catch (createError) {
                  core.warning(`Failed to ensure label ${label.name}: ${createError.message}`);
                }
              }
            }

            // Add needs-triage to all issues
            if (!currentLabels.includes('needs-triage')) {
              labelsToAdd.add('needs-triage');
            }

            // Category labels from title
            if (title.includes('bug')) {
              labelsToAdd.add('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.add('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.add('maintenance');
            }

            // Priority labels from title or body
            const text = `${title} ${body}`;
            let priority = 'priority-medium';

            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const mediumKeywords = ['medium', 'normal'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];

            function containsAny(keywords) {
              return keywords.some(k => text.includes(k.toLowerCase()));
            }

            if (containsAny(criticalKeywords)) {
              priority = 'priority-critical';
            } else if (containsAny(highKeywords)) {
              priority = 'priority-high';
            } else if (containsAny(mediumKeywords)) {
              priority = 'priority-medium';
            } else if (containsAny(lowKeywords)) {
              priority = 'priority-low';
            }

            labelsToAdd.add(priority);

            // Remove other priority labels if present
            const allPriorityLabels = ['priority-critical', 'priority-high', 'priority-medium', 'priority-low'];
            for (const l of currentLabels) {
              if (allPriorityLabels.includes(l) && l !== priority) {
                labelsToRemove.add(l);
              }
            }

            // Apply label changes
            const finalLabelsToAdd = Array.from(labelsToAdd).filter(l => !currentLabels.includes(l));
            const finalLabelsToRemove = Array.from(labelsToRemove);

            if (finalLabelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: finalLabelsToAdd,
              });
              core.info(`Added labels: ${finalLabelsToAdd.join(', ')}`);
            }

            for (const label of finalLabelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: label,
                });
                core.info(`Removed label: ${label}`);
              } catch (error) {
                core.warning(`Failed to remove label ${label}: ${error.message}`);
              }
            }

  task-breakdown:
    name: Epic Task Breakdown
    runs-on: ubuntu-latest
    needs: issue-triage
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      contains(github.event.issue.title, 'Epic')
    steps:
      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found, exiting.');
              return;
            }

            const issueNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation',
            ];

            const createdIssues = [];

            for (let i = 0; i < tasks.length; i++) {
              const taskName = tasks[i];
              const title = `[SUBTASK] ${issue.title} - Task ${i + 1}: ${taskName}`;
              const body = `Related to #${issueNumber}\n\nAutomatic subtask generated for epic. Task: ${taskName}`;

              try {
                const { data: subIssue } = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: ['enhancement', 'needs-review'],
                });
                createdIssues.push(subIssue.number);
              } catch (error) {
                core.warning(`Failed to create sub-issue for ${taskName}: ${error.message}`);
              }
            }

            if (createdIssues.length === 0) {
              core.warning('No sub-issues were created.');
              return;
            }

            const checklistItems = createdIssues
              .map((num, index) => `- [ ] Task ${index + 1}: ${tasks[index]} (#${num})`)
              .join('\n');

            const originalBody = issue.body || '';
            const epicSectionHeader = '\n\n## Epic Tasks\n';
            const newBody = `${originalBody}${epicSectionHeader}${checklistItems}`;

            try {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                body: newBody,
              });
            } catch (error) {
              core.warning(`Failed to update epic parent issue body: ${error.message}`);
            }

  auto-response:
    name: Auto Response and Milestoning
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Auto respond to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found, exiting.');
              return;
            }

            const issueNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const author = issue.user.login;

            // Get all issues created by this author in this repo (up to 100)
            let isFirstIssueInRepo = false;
            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'all',
                creator: author,
                per_page: 100,
              });

              const previousIssues = issues.filter(i => i.number !== issueNumber);
              isFirstIssueInRepo = previousIssues.length === 0;
            } catch (error) {
              core.warning(`Failed to determine if this is first issue for ${author}: ${error.message}`);
            }

            const currentLabels = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
            const labelsToAdd = new Set();
            const labelsToRemove = new Set();

            if (isFirstIssueInRepo) {
              labelsToAdd.add('first-time-contributor');
            }

            // Determine issue type based on labels
            const isBug = currentLabels.includes('bug');
            const isEpic = currentLabels.includes('epic');
            const isMaintenance = currentLabels.includes('maintenance');

            let commentBody = `Thank you @${author} for opening this issue!`;

            if (isBug) {
              commentBody += `\n\nBug Report Guidelines:\n- Please ensure the bug can be reliably reproduced.\n- Provide logs, screenshots, and environment details where possible.`;
            } else if (isEpic) {
              commentBody += `\n\nFeature Request Process:\n- We will review this epic and break it down into actionable tasks.\n- Please provide as much context and acceptance criteria as possible.`;
            } else if (isMaintenance) {
              commentBody += `\n\nMaintenance Guidelines:\n- Describe clearly what maintenance is required.\n- Indicate any potential impact or risk involved.`;
            } else {
              commentBody += `\n\nOur team will review your issue shortly.`;
            }

            // Add welcome note for first-time contributors
            if (isFirstIssueInRepo) {
              commentBody += `\n\nWe see this is your first issue in this repository — welcome! 🎉`;
            }

            // Post comment
            try {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentBody,
              });
            } catch (error) {
              core.warning(`Failed to post auto-response comment: ${error.message}`);
            }

            // Milestone logic for priority-high and priority-critical
            const hasPriorityHigh = currentLabels.includes('priority-high');
            const hasPriorityCritical = currentLabels.includes('priority-critical');

            if (hasPriorityHigh || hasPriorityCritical) {
              try {
                // Ensure milestone v1.0.0 exists
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                });

                let milestoneId = null;
                const existing = milestones.find(m => m.title === 'v1.0.0');

                if (existing) {
                  milestoneId = existing.number;
                } else {
                  const { data: created } = await github.rest.issues.createMilestone({
                    owner,
                    repo,
                    title: 'v1.0.0',
                  });
                  milestoneId = created.number;
                }

                if (milestoneId !== null) {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    milestone: milestoneId,
                  });
                }
              } catch (error) {
                core.warning(`Failed to set milestone: ${error.message}`);
              }
            }

            // Change status from needs-triage to needs-review
            if (currentLabels.includes('needs-triage')) {
              labelsToRemove.add('needs-triage');
              labelsToAdd.add('needs-review');
            }

            const finalLabelsToAdd = Array.from(labelsToAdd).filter(l => !currentLabels.includes(l));
            const finalLabelsToRemove = Array.from(labelsToRemove);

            if (finalLabelsToAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: finalLabelsToAdd,
                });
              } catch (error) {
                core.warning(`Failed to add labels ${finalLabelsToAdd.join(', ')}: ${error.message}`);
              }
            }

            for (const label of finalLabelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                core.warning(`Failed to remove label ${label}: ${error.message}`);
              }
            }
